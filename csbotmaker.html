<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CS 1.6 Bot Maker | by ROOT44x</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; background: #12161a; color: #e1e7ed; }
        .card { background: #1a2129; padding: 25px; border-radius: 8px; border: 1px solid #2d3845; }
        h2, h3 { color: #de9b35; text-transform: uppercase; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; background: #0d1115; border: 1px solid #2d3845; color: #e1e7ed; border-radius: 4px; margin-bottom: 10px; }
        button { background: #de9b35; color: #000; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .btn-gen { background: #242f3a; color: #e1e7ed; width: auto; padding: 6px 12px; font-size: 12px; margin-bottom: 5px; }
        .credit { text-align: center; margin-top: 20px; font-size: 12px; color: #8a96a3; }
        .credit strong { color: #de9b35; }
    </style>
</head>
<body>
<div class="card">
    <h2>CS 1.6 Bot Profile Maker</h2>
    <form id="botForm">
        <h3>1. Elite Template</h3>
        <input type="text" id="eliteWeapons" value="awp, deagle, scout, m4a1, ak47">
        <div class="grid">
            <input type="number" id="eliteSkill" value="100" placeholder="Skill">
            <input type="number" id="eliteAggression" value="95" placeholder="Aggression">
            <input type="text" id="eliteReaction" value="0.12" placeholder="Reaction Time">
            <input type="number" id="eliteVoice" value="85" placeholder="Voice Pitch">
            <select id="eliteTeam"><option value="ANY">Any Team</option><option value="CT">CT</option><option value="T">T</option></select>
            <input type="number" id="eliteSkin" value="0" placeholder="Skin (0-4)">
        </div>
        <h3>2. Rusher Template</h3>
        <input type="text" id="rusherWeapons" value="ak47, m4a1, mac10, mp5">
        <div class="grid">
            <input type="number" id="rusherSkill" value="80" placeholder="Skill">
            <input type="number" id="rusherAggression" value="100" placeholder="Aggression">
            <input type="text" id="rusherReaction" value="0.22" placeholder="Reaction Time">
            <input type="number" id="rusherVoice" value="115" placeholder="Voice Pitch">
            <select id="rusherTeam"><option value="ANY">Any Team</option><option value="CT">CT</option><option value="T">T</option></select>
            <input type="number" id="rusherSkin" value="0" placeholder="Skin (0-4)">
        </div>
        <h3>3. Bot Names List</h3>
        <button type="button" class="btn-gen" onclick="genNames()">🎲 Auto-Generate Names</button>
        <textarea id="botList" rows="6">EliteSniper, Alpha_ROOT&#10;Rusher, Bravo_ROOT&#10;EliteSniper, Charlie_ROOT</textarea>
        <button type="button" onclick="buildFile()">Generate & Download BotProfile.db</button>
    </form>
    <div class="credit">Application developed by <strong>ROOT44x</strong></div>
</div>
<script>
function genNames() {
    const names = ["Spike", "Neo", "Viper", "Raptor", "Slayer", "Shadow", "Phoenix", "Titan", "Blitz", "Ace"];
    const tags = ["[ROOT44x]", "*ROOT*", "R44x|"];
    let out = [];
    for(let i=0; i<10; i++) {
        let t = Math.random() > 0.5 ? "EliteSniper" : "Rusher";
        let n = names[Math.floor(Math.random()*names.length)] + "_" + Math.floor(Math.random()*99);
        if(Math.random() > 0.5) n = tags[Math.floor(Math.random()*tags.length)] + n;
        out.push(t + ", " + n);
    }
    document.getElementById('botList').value = out.join('\n');
}
function buildFile() {
    let txt = "// Custom Bot Profile\n// Created by ROOT44x\n\nWeaponPreference\n  Default\n    m4a1, ak47, mp5, deagle\n  End\nEnd\n\n";
    
    // Elite
    txt += "Template EliteSniper\n  WeaponPreference = " + document.getElementById('eliteWeapons').value + "\n";
    txt += "  Skill = " + document.getElementById('eliteSkill').value + "\n  Aggression = " + document.getElementById('eliteAggression').value + "\n";
    txt += "  ReactionTime = " + document.getElementById('eliteReaction').value + "\n  VoicePitch = " + document.getElementById('eliteVoice').value + "\n";
    if(document.getElementById('eliteTeam').value !== "ANY") txt += "  Team = " + document.getElementById('eliteTeam').value + "\n";
    if(parseInt(document.getElementById('eliteSkin').value) > 0) txt += "  Skin = " + document.getElementById('eliteSkin').value + "\n";
    txt += "End\n\n";

    // Rusher
    txt += "Template Rusher\n  WeaponPreference = " + document.getElementById('rusherWeapons').value + "\n";
    txt += "  Skill = " + document.getElementById('rusherSkill').value + "\n  Aggression = " + document.getElementById('rusherAggression').value + "\n";
    txt += "  ReactionTime = " + document.getElementById('rusherReaction').value + "\n  VoicePitch = " + document.getElementById('rusherVoice').value + "\n";
    if(document.getElementById('rusherTeam').value !== "ANY") txt += "  Team = " + document.getElementById('rusherTeam').value + "\n";
    if(parseInt(document.getElementById('rusherSkin').value) > 0) txt += "  Skin = " + document.getElementById('rusherSkin').value + "\n";
    txt += "End\n\n";

    // Bots
    document.getElementById('botList').value.split('\n').forEach(l => {
        let p = l.split(',');
        if(p.length === 2) txt += p[0].trim() + " " + p[1].trim() + "\n";
    });

    let blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "BotProfile.db";
    a.click();
}
</script>
</body>
</html>
